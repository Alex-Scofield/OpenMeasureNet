name: open-measure-net

services:

  database:
    image: postgis/postgis
    ports: 
      - 5432:5432
    env_file:
      - .env
    volumes:
      - ./output/db-data/:/var/lib/postgresql/data/
      - ./omn-db/init.sql:/docker-entrypoint-initdb.d/01_init.sql

  mosquitto:
    build:
      context: .
      dockerfile: omn-transfer/mqtt-transfer/Dockerfile.mosquitto
      args:
        ARCHIVER_PASSWORD: ${MQTT_ARCHIVER_PASSWORD:-admin_pass}
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./omn-transfer/mqtt-transfer/config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  grafana:
    image: grafana/grafana:latest
    user: "0:0"
    env_file:
      - .env
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${POSTGRES_HOST}:5432
      GF_DATABASE_NAME: ${POSTGRES_DB}
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "1s"
      GF_LOG_LEVEL: "error"
    restart: unless-stopped
    depends_on:
        - database
    ports:
      - 3111:3000
    volumes:
      - ./output/grafana:/var/lib/grafana
      - ./omn-backend/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./omn-backend/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards

  archiver:
    build:
      context: .
      dockerfile: omn-transfer/mqtt-transfer/Dockerfile.archiver
    depends_on:
      - database
      - mosquitto
    env_file:
      - .env
    restart: unless-stopped

  api:
    build:
      context: omn-backend/api
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - database
    restart: unless-stopped

  bulk:
    build:
      context: omn-transfer/bulk
      dockerfile: Dockerfile.bulk
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - database
    restart: unless-stopped

  toolbox:
    profiles:
      - cli
    build:
      context: .
      dockerfile: scripts/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    working_dir: /project

  frontend:
    build:
      context: omn-frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
