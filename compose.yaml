name: backend-mateo

services:

  database:
    image: postgis/postgis
    ports: 
      - 5432:5432
    env_file:
      - .env
    volumes:
      - ./db-data/:/var/lib/postgresql/data/
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql

  mosquitto:
    build:
      context: .
      dockerfile: docker/Dockerfile.mosquitto
      args:
        ARCHIVER_PASSWORD: ${MQTT_ARCHIVER_PASSWORD:-admin_pass}
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  grafana:
    image: grafana/grafana:latest
    user: "0:0"
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${POSTGRES_HOST}:5432
      GF_DATABASE_NAME: ${POSTGRES_DB}
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "1s"
      GF_LOG_LEVEL: "error"
    restart: unless-stopped
    depends_on:
        - database
    ports:
      - 3111:3000
    volumes:
      - ./grafana:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards

  archiver:
    build:
      context: .
      dockerfile: docker/Dockerfile.archiver
    depends_on:
      - database
      - mosquitto
    env_file:
      - .env
    restart: unless-stopped

  toolbox:
    profiles:
      - cli
    build:
      context: .
      dockerfile: docker/Dockerfile.toolbox
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    working_dir: /project
